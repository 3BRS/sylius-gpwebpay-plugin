imports:
    - { resource: "../../../vendor/sylius/sylius/src/Sylius/Behat/Resources/config/services.xml" }
    - { resource: "../../Behat/Resources/services.xml" }

# workaround needed for strange "test.client.history" problem
# see https://github.com/FriendsOfBehat/SymfonyExtension/issues/88
services:
    Symfony\Component\BrowserKit\AbstractBrowser: '@test.client'

    ThreeBRS\SyliusGPWebpayPaymentGatewayPlugin\Api\GPWebpayApiInterface:
        class: Tests\ThreeBRS\SyliusGPWebpayPaymentGatewayPlugin\Api\GPWebpayApiMock

    # Disable UserContext check in AddItemToCartHandler for Behat tests.
    # The handler's assertCartAccessible() reads from TokenStorage, which is
    # empty during Behat setup-context command dispatch (the session-based
    # SecurityService only sets a session cookie, not the in-memory token).
    sylius_api.command_handler.cart.add_item_to_cart:
        class: Sylius\Bundle\ApiBundle\CommandHandler\Cart\AddItemToCartHandler
        arguments:
            - '@sylius.repository.order'
            - '@sylius.repository.product_variant'
            - '@sylius.modifier.order'
            - '@sylius.factory.order_item'
            - '@sylius.modifier.order_item_quantity'
            - null
        tags:
            - { name: messenger.message_handler, bus: sylius.command_bus }
